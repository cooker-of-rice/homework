<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Evidence zařízení</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #1e1e1e; 
            color: white; 
            margin: 0; 
            padding: 20px; 
        }
        
        
        nav ul { 
            display: flex; 
            list-style: none; 
            padding: 0; gap: 20px; 
        }
        nav a { 
            color: #3a8dd0; 
            text-decoration: none; 
        }

        
        .device-container { 
            display: flex; 
            flex-wrap: wrap; gap: 20px; 
            margin-bottom: 40px; 
        }
        .card { 
            background: #2a2a2a; 
            padding: 15px; border-radius: 8px; 
            width: 200px;
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 5px 15px rgba(58, 141, 208, 0.4); 
        }

        
        form { max-width: 300px; }
        input, select { 
            width: 100%; padding: 8px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background: #333; 
            color: white; 
        }
        button[type="submit"] { 
            background: linear-gradient(#3a8dd0, #256395); 
            color: white; 
            border: none; 
            padding: 10px; cursor: pointer; 
            width: 100%; 
            border-radius: 5px;
        }
        button[type="submit"]:hover { 
            background: #3a8dd0; 
        }

        @media (max-width: 600px) {
            .device-container { 
                flex-direction: column; 
            }
            nav ul { 
                flex-direction: column; 
            }
        }
    </style>
</head>
<body>


    <h1>Evidence zařízení</h1>

    <section>
        <h2>Menu</h2>
        <nav>
            <ul>
                <li><a href="#">Domů</a></li>
                <li><a href="#zarizeni">Zařízení</a></li>
                <li><a href="#pridat">Přidat zařízení</a></li>
                <li><a href="#">Kontakt</a></li>
            </ul>
        </nav>
    </section>

    <section id="zarizeni">
        <h2>Přehled zařízení</h2>
        <div class="device-container">
            <article class="card">
                <h3>Notebook Lenovo</h3>
                <p>Typ: Laptop</p>
                <p>Stav: Funkční</p>
                <button>Detail</button>
            </article>
            <article class="card">
                <h3>iPhone 13</h3>
                <p>Typ: Telefon</p>
                <p>Stav: Funkční</p>
                <button>Detail</button>
            </article>
            <article class="card">
                <h3>Monitor Dell</h3>
                <p>Typ: Periferie</p>
                <p>Stav: Nefunkční</p>
                <button>Detail</button>
            </article>
        </div>
    </section>

    <section id="pridat">
        <h2>Přidat zařízení</h2>
        <form>
            <input type="text" maxlength="20" placeholder="Název zařízení" required>
            <select>
                <option>Laptop</option>
                <option>Telefon</option>
                <option>Periferie</option>
            </select>
            <button type="submit">Odeslat</button>
        </form>
    </section>

</body>
</html>
